name: Build ShieldGuard APK (Full Auto)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🧹 Clean project (remove lixo commitado)
        run: |
          rm -rf .gradle || true
          rm -rf app/build || true
          rm -f local.properties || true

      - name: ⚙️ Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: 🔐 Fix permissions
        run: chmod +x gradlew

      - name: 📦 Gradle clean
        run: ./gradlew clean

      - name: 🛠️ Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 🛠️ Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ShieldGuard-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ShieldGuard-release
          path: app/build/outputs/apk/release/app-release.apk