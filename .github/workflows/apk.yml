name: AutoFix + Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      # 🧹 LIMPEZA PESADA
      - name: 🧹 Clean garbage
        run: |
          rm -rf .gradle || true
          rm -rf app/build || true
          rm -f local.properties || true

      # 🔧 RECRIA local.properties
      - name: ⚙️ Fix SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      # 🔐 Permissão gradlew
      - name: 🔐 Fix gradlew
        run: chmod +x gradlew

      # 🧠 AUTO PATCH BUILD.GRADLE
      - name: 🧠 Patch Gradle (Compose + OptIn)
        run: |
          FILE=app/build.gradle

          if [ -f "$FILE" ]; then
            echo "Patching $FILE..."

            # adiciona opt-in Material3 se não existir
            grep -q "ExperimentalMaterial3Api" $FILE || sed -i '/kotlinOptions {/a\        freeCompilerArgs += ["-opt-in=androidx.compose.material3.ExperimentalMaterial3Api"]' $FILE

            # força jvmTarget
            grep -q "jvmTarget" $FILE || sed -i '/kotlinOptions {/a\        jvmTarget = "17"' $FILE
          fi

      # 🏗️ BUILD
      - name: 🏗️ Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 📦 VERIFICA APK
      - name: ✅ Check APK
        run: |
          if [ ! -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "❌ APK não gerado"
            exit 1
          fi

      # 📤 UPLOAD
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ShieldGuard-AutoBuild
          path: app/build/outputs/apk/debug/app-debug.apk